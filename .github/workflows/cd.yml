name: CD MyBank DockerHub Synology

on:
  workflow_run:
    workflows: ["CI MyBank"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mybank-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push Docker Hub images
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Compute image tags
        id: vars
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${GITHUB_SHA}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "short_sha=${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mybank-backend:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mybank-backend:${{ steps.vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=mybank-backend
            org.opencontainers.image.description=Backend Symfony de MyBank
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=mybank-backend
          cache-to: type=gha,mode=max,scope=mybank-backend
          provenance: false
          sbom: false

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mybank-frontend:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mybank-frontend:${{ steps.vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=mybank-frontend
            org.opencontainers.image.description=Frontend React/Vite de MyBank
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=mybank-frontend
          cache-to: type=gha,mode=max,scope=mybank-frontend
          provenance: false
          sbom: false

  deploy:
    name: Deploy on Synology DS225+
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/mybank_deploy
          chmod 600 ~/.ssh/mybank_deploy
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Copy production files
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/mybank_deploy -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            'mkdir -p /volume1/docker/mybank'
          scp -i ~/.ssh/mybank_deploy -P "$SERVER_PORT" docker-compose.prod.yml \
            "$SERVER_USER@$SERVER_HOST:/volume1/docker/mybank/docker-compose.yml"
          scp -i ~/.ssh/mybank_deploy -P "$SERVER_PORT" scripts/deploy-remote.sh \
            "$SERVER_USER@$SERVER_HOST:/volume1/docker/mybank/deploy-remote.sh"

      - name: Pull and restart containers
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.short_sha }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/mybank_deploy -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "cd /volume1/docker/mybank && chmod +x deploy-remote.sh && IMAGE_TAG='$IMAGE_TAG' ./deploy-remote.sh"
